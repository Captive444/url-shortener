<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener - Сокращатель ссылок</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔗 URL Shortener</h1>
            <p>Сокращайте длинные ссылки за секунду</p>
        </header>

        <div class="card">
            <h2>Создать короткую ссылку</h2>
            <form id="shortenForm">
                <input type="url" id="longUrl" placeholder="https://example.com/xxxx/zzzzz/ccccc..." required>
                <button type="submit">Сократить</button>
            </form>
            <div id="result" class="result hidden">
                <h3>Ваша короткая ссылка:</h3>
                <div class="short-url-container">
                    <input type="text" id="shortUrl" readonly>
                    <button id="copyBtn" class="copy-btn">📋 Копировать</button>
                </div>
                <a id="statsLink" href="#" target="_blank">📊 Посмотреть статистику</a>
            </div>
        </div>

        <div class="card">
            <h2>Проверить статистику</h2>
            <form id="statsForm">
                <input type="text" id="shortId" placeholder="Введите короткий ID (например: abc123)">
                <button type="submit">Показать статистику</button>
            </form>
            <div id="statsResult" class="result hidden">
                <h3>Статистика перехода:</h3>
                <p>ID: <strong id="statsId"></strong></p>
                <p>Количество переходов: <strong id="statsClicks"></strong></p>
            </div>
        </div>

        <footer>
            <p>⚡ Простой сервис сокращения ссылок | <a href="/docs" target="_blank">API Docs</a></p>
        </footer>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
