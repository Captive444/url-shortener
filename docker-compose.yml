version: '3.8'

services:
  url-shortener:
    build: .
    container_name: url-shortener
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - BASE_URL=http://localhost:8000
      - SHORT_ID_LENGTH=6
    restart: unless-stopped